# Window rules

# Show Me The Key - keyboard overlay (bottom-right of DP-2)
windowrule = float on, match:class ^(showmethekey-gtk)$
windowrule = pin on, match:class ^(showmethekey-gtk)$
windowrule = size 860 55, match:class ^(showmethekey-gtk)$
windowrule = monitor DP-2, match:class ^(showmethekey-gtk)$
windowrule = move 100%-910 100%-105, match:class ^(showmethekey-gtk)$
windowrule = no_focus on, match:class ^(showmethekey-gtk)$
windowrule = no_blur on, match:class ^(showmethekey-gtk)$
windowrule = no_shadow on, match:class ^(showmethekey-gtk)$
windowrule = decorate off, match:class ^(showmethekey-gtk)$
windowrule = workspace special:showmethekey silent, match:class ^(showmethekey-gtk)$
