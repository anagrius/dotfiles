# keyd configuration for Nordic characters
# Install keyd: https://github.com/rvaiya/keyd
# Copy to /etc/keyd/default.conf or ~/.config/keyd/default.conf
# Then run: sudo systemctl enable --now keyd

[ids]
*

[main]
# Danish characters with Left Alt (Alt/Meta)
# Swedish characters with Right Alt (AltGr)

# Semicolon mappings
alt+semicolon = macro(æ)
alt+shift+semicolon = macro(Æ)
rightalt+semicolon = macro(ä)
rightalt+shift+semicolon = macro(Ä)

# Apostrophe mappings
alt+apostrophe = macro(ø)
alt+shift+apostrophe = macro(Ø)
rightalt+apostrophe = macro(ö)
rightalt+shift+apostrophe = macro(Ö)

# Bracket mappings
alt+leftbrace = macro(å)
alt+shift+leftbrace = macro(Å)
rightalt+leftbrace = macro(å)
rightalt+shift+leftbrace = macro(Å)
